<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Showcase | Home</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body class="summary-container">
    
    <!-- Swappable Content -->
    <div id="app-wrap">
        <div class="container text-center">
            <h1 class="mx-auto mb-5 fw-bold fade-in" style="font-size: 3.5rem; letter-spacing: -2px;">The <span style="color: #00d4ff;">Autistic Duo</span></h1>
            <p class="mx-auto mb-5 text-secondary fade-in">Select a portfolio to explore their work, skills, and legacy.</p>

            <div class="row justify-content-center g-4 fade-in">
                <div class="col-md-6 d-flex justify-content-center">
                    <a href="portfolio1.html" class="card-custom">
                        <img src="assets/nmk36.png" alt="Thai">
                        <h3 class="fw-bold">Thai</h3>
                        <p class="text-secondary small">Full-Stack AI Abuser</p>
                        <div class="mt-3 text-info">View Portfolio &rarr;</div>
                    </a>
                </div>
                <div class="col-md-6 d-flex justify-content-center">
                    <a href="portfolio2.html" class="card-custom">
                        <img src="assets/avatar2.png" alt="Ner">
                        <h3 class="fw-bold">Ner</h3>
                        <p class="text-secondary small">UI/UX Visionary</p>
                        <div class="mt-3 text-info">View Portfolio &rarr;</div>
                    </a>
                </div>
            </div>
            
            <footer class="mt-5 text-secondary opacity-50 small">
                Built for discovery_piscine/rush
            </footer>
        </div>
    </div>

    <!-- Persistent Music Player -->
    <div id="youtube-player"></div>
    <div class="music-toggle" id="musicToggle">
        <i class="fas fa-play" id="musicIcon"></i>
    </div>
    <div class="music-info">Yungtarr - Jupiter</div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="music-player.js"></script>
</body>
</html>
