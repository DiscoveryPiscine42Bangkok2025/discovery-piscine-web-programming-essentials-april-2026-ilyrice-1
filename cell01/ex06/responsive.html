<!DOCTYPE html>
<html>
<head>
    <title>Responsive Table</title>
    <style>
        /* This part is the secret sauce */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        table {
            width: 100%;
            height: 100%;
            border-collapse: collapse;
        }

        td {
            border: 2px solid black;
            text-align: center;
            font-size: 5vw; /* This makes the text grow/shrink with the window! */
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td style="background-color: lightcoral;">Left Side</td>
            <td style="background-color: lightseagreen;">Right Side</td>
        </tr>
    </table>

</body>
</html>
