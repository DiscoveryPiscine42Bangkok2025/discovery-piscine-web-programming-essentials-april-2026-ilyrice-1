<!DOCTYPE html>
<html>
<head>
    <title>Table Exercise</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        td {
            border: 2px solid black;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }
    </style>
</head>
<body>

    <table>
        <tr>
            <td style="background-color: lightblue;">First cell</td>
            <td style="background-color: lightgreen;">Second cell</td>
        </tr>
    </table>

</body>
</html>
