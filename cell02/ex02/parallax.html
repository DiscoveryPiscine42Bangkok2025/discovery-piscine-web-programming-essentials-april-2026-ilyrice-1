<!DOCTYPE html>
<html>
<head>
    <title>Parallax Effect</title>
    <link rel="stylesheet" href="parallax.css">
</head>
<body>

    <div class="parallax img1">
        <div class="caption">
            <span class="border">FIRST MESSAGE</span>
        </div>
    </div>

    <div class="black-block">
        <h3>Middle Section</h3>
        <p>This is the black block with a custom message of your choice. As you scroll, notice how the images behind seem to stay in place.</p>
    </div>

    <div class="parallax img2">
        <div class="caption">
            <span class="border">FINAL MESSAGE</span>
        </div>
    </div>

</body>
</html>
